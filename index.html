<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/nexora_mascot_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexora - Your Personal Flow Companion</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0D1B4C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nexora">
    <link rel="apple-touch-icon" href="/nexora_mascot_logo.png">
  </head>
  <body>
    <div id="root">
      <div id="pre-loader" style="position: fixed; inset: 0; background: #081225; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: system-ui, -apple-system, sans-serif;">
        <img src="/nexora_mascot_logo.png" alt="Nexora" style="width: 120px; height: 120px; border-radius: 28px; box-shadow: 0 0 30px rgba(59, 130, 246, 0.4), 0 8px 10px rgba(0, 0, 0, 0.3);" />
        <div style="margin-top: 24px; font-weight: 900; font-style: italic; color: #FFFFFF; font-size: 26px; letter-spacing: 0.05em; text-shadow: 0 0 10px rgba(96, 165, 250, 0.5);">NEXORA</div>
        <div style="margin-top: 15px; width: 50px; height: 4px; background: #60A5FA; border-radius: 2px; animation: pulse 1.5s infinite ease-in-out;"></div>
        <style>
          @keyframes pulse {
            0% { opacity: 0.3; width: 20px; }
            50% { opacity: 1; width: 60px; }
            100% { opacity: 0.3; width: 20px; }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loader once React mounts
      window.addEventListener('load', () => {
        const loader = document.getElementById('pre-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.5s ease';
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
