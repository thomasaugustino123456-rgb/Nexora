<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/nexora_mascot_new.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexora - Your Personal Flow Companion</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0D1B4C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nexora">
    <link rel="apple-touch-icon" href="/nexora_mascot_new.png">
    
    <!-- Preload the premium app mascot image so it loads immediately at extreme speed -->
    <link rel="preload" as="image" href="/nexora_mascot_new.png" fetchpriority="high">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function initBulletproofSplash() {
        const splashScreen = document.getElementById('splashScreen');
        if (splashScreen) {
          setTimeout(() => { splashScreen.classList.add('show-text'); }, 2800);
          setTimeout(() => {
            splashScreen.classList.add('exit-splash');
            setTimeout(() => { splashScreen.style.display = 'none'; }, 1000);
          }, 4500);
          splashScreen.addEventListener('click', () => {
            splashScreen.classList.add('exit-splash');
            setTimeout(() => { splashScreen.style.display = 'none'; }, 600);
          });
        }
      })();
    </script>
  </body>
</html>
